    // ============================================================

    async function fetchAddressInfo(addresses) {
      const url = `/api/address-info?addresses=${addresses.join(',')}`;
      const res = await fetch(url);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`address-info ${res.status}: ${text}`);
      }
      const data = await res.json();
      return data;
    }

    async function fetchVaultBalance() {
      const loadingEl = document.getElementById('vaultLoading');
      const errorEl = document.getElementById('vaultError');
      const contentEl = document.getElementById('vaultContent');
      const vaultBadge = document.getElementById('vaultLiveBadge');

      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      contentEl.style.display = 'none';
      if (vaultBadge) vaultBadge.classList.add('stale');

      // Intentar usar caché local
      const cached = getCache();
      if (cached) {
        lastVaultRender = { payload: cached, isLive: false, source: 'Cache' };
        renderVaultData(cached, false, 'Cache');
        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
      }

      try {
        const data = await fetchAddressInfo([CONFIG.VAULT_ADDRESS]);
        const result = data.results?.[0];
        if (!result) throw new Error('No data for vault address');
        
        const lovelace = Number(result.balance || 0);
        const ada = lovelace / 1_000_000;
        const utxos = result.utxo_set || [];
        const payload = { ada, utxos, timestamp: Date.now() };
        saveCache(payload);
        lastVaultRender = { payload, isLive: true, source: 'Blockfrost (via Cloudflare)' };
        renderVaultData(payload, true, 'Blockfrost (via Cloudflare)');
        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
        if (vaultBadge) vaultBadge.classList.remove('stale');
      } catch (err) {
        console.error('Error fetching vault:', err);
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.innerHTML = `
          ⚠️ Could not fetch vault data.
          <br>${err.message}
          <button class="retry-btn" onclick="fetchVaultBalance()">↻ Retry</button>
        `;
      }
    }

    async function fetchBurnTracking() {
      if (!CONFIG.BURN_ADDRESS || !CONFIG.TOKEN_POLICY_ID || !CONFIG.TOKEN_ASSET_NAME_HEX) {
        document.getElementById('burnPctDisplay').textContent = '—';
        document.getElementById('burnPctInside').textContent = '—';
        document.getElementById('burnFill').style.width = '0%';
        return;
      }
      try {
        const data = await fetchAddressInfo([CONFIG.BURN_ADDRESS]);
        const result = data.results?.[0];
        if (!result) return;
        let burned = 0;
        (result.utxo_set || []).forEach(utxo => {
          (utxo.asset_list || []).forEach(a => {
            if (a.policy_id === CONFIG.TOKEN_POLICY_ID && a.asset_name === CONFIG.TOKEN_ASSET_NAME_HEX) {
              burned += Number(a.quantity);
            }
          });
        });
        lastBurnedAmount = burned;
        const pct = (burned / CONFIG.TOKEN_TOTAL_SUPPLY) * 100;
        const burnDecimals = CONFIG.DECIMALS[CONFIG.TOKEN_TICKER] != null ? CONFIG.DECIMALS[CONFIG.TOKEN_TICKER] : 6;
        const burnedFormatted = formatTokenAmount(burned, burnDecimals);
        const totalFormatted = formatTokenAmount(CONFIG.TOKEN_TOTAL_SUPPLY, burnDecimals);

        document.getElementById('burnPctDisplay').textContent = pct.toFixed(2) + '%';
        document.getElementById('burnPctInside').textContent = pct.toFixed(0) + '%';
        document.getElementById('burnFill').style.width = Math.min(pct, 100) + '%';
        document.getElementById('burnPctInside').style.opacity = pct < 12 ? '0' : '1';
        document.getElementById('burnAmountDetail').textContent = `(${burnedFormatted} WHALE)`;
        document.getElementById('burnDetail').textContent =
          `${burnedFormatted} $WHALECOIN burned of ${totalFormatted} total supply`;
        const tokBurnedEl = document.getElementById('tokBurnedRow');
        if (tokBurnedEl) tokBurnedEl.textContent = `${burnedFormatted} (${pct.toFixed(2)}%)`;

        renderBurnValue();
        renderMarketData();
      } catch (err) {
        console.warn('Burn tracking error:', err);
      }
    }

    async function fetchLockedTracking() {
      if (!CONFIG.LOCKED_ADDRESS) return;
      try {
        const data = await fetchAddressInfo([CONFIG.LOCKED_ADDRESS]);
        const result = data.results?.[0];
        if (!result) return;
        let locked = 0;
        (result.utxo_set || []).forEach(utxo => {
          (utxo.asset_list || []).forEach(a => {
            if (a.policy_id === CONFIG.TOKEN_POLICY_ID && a.asset_name === CONFIG.TOKEN_ASSET_NAME_HEX) {
              locked += Number(a.quantity);
            }
          });
        });
        lastLockedAmount = locked;
        const burnDecimals = CONFIG.DECIMALS[CONFIG.TOKEN_TICKER] != null ? CONFIG.DECIMALS[CONFIG.TOKEN_TICKER] : 6;
        document.getElementById('tokLockedRow').textContent = formatTokenAmount(locked, burnDecimals);
        const circulating = CONFIG.TOKEN_TOTAL_SUPPLY - lastBurnedAmount - locked;
        document.getElementById('tokCirculatingRow').textContent = formatTokenAmount(circulating, burnDecimals);
        renderMarketData();
      } catch (err) {
        console.warn('Locked tracking error:', err);
      }
    }
